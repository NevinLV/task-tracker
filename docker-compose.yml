services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tasktracker
      POSTGRES_PASSWORD: tasktracker
      POSTGRES_DB: tasktracker
    # На Windows часто уже установлен локальный PostgreSQL на :5432 — тогда Docker и хост делят порт
    # и asyncpg получает обрыв соединения. Снаружи используем 5433 → внутри контейнера 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
